<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HydroControl</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🌱 Hidroponia-web</h1>

         <div class="card">
            
            <p>Por: R.Joaquin</p>
        </div>

        

        <div class="card">

            <h2>🌡️ Temperatura</h2>

            <p id="temp">24.5°C</p>

        </div>

        <div class="card">

            <h2>💧 Humedad</h2>

            <p id="hum">68%</p>

        </div>

        <div class="card">

            <h2>💡 Luces</h2>

            <p id="estadoLuz">OFF</p>

            <button id="luzOn">Encender</button>

            <button id="luzOff">Apagar</button>

        </div>

        <div class="card">

            <h2>💧 Bomba</h2>

            <p id="estadoBomba">OFF</p>

            <button id="bombaOn">Encender</button>

            <button id="bombaOff">Apagar</button>

        </div>

        <div class="card">
            <h2>⚙️ Modo</h2>
            <label>Modo automático: <input type="checkbox" id="modoAuto"></label>
            <div class="row">
                <label>Época:
                    <select id="epocaSelect">
                        <option value="primavera">Primavera</option>
                        <option value="verano">Verano</option>
                        <option value="otonio">Otoño</option>
                        <option value="invierno">Invierno</option>
                    </select>
                </label>
            </div>
            <div class="row">
                <label>Humedad umbral (%): <input type="number" id="humThreshold" min="0" max="100" value="60"></label>
            </div>
        </div>

         <div class="card">
            <h2>⏱ Horarios</h2>
            <label>Inicio luces: <input type="time" id="lightsStart"></label>
            <label>Fin luces: <input type="time" id="lightsEnd"></label>
            <label>Intervalo bomba (min): <input type="number" id="pumpInterval" min="1" value="30"></label>
        </div>

        <div class="card">
            <h2>🔌 Conexión ESP8266</h2>
            <label>IP del ESP8266: <input type="text" id="espIp" placeholder="192.168.1.50"></label>
            <button id="saveSettings">Guardar ajustes</button>
            <p id="connStatus">No conectado</p>
        </div>

       

    </div>

    <script src="script.js"></script>

</body>

</html>
